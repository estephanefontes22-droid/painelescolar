<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Escolar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: url('fundo.jpg') no-repeat center center fixed;
    background-size: cover;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* LAYOUT */
.overlay {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.layout {
    display: flex;
    gap: 20px;
    flex: 1;
    padding: 10px;
}

/* HEADER */
header {
    text-align:center;
    padding:20px;
    font-size:clamp(20px, 2.5vw, 32px);
    font-weight:700;
    color:#0d2a5c;
    background: rgba(255,255,255,0.9);
    border-radius:15px;
    max-width:900px;
    margin:20px auto;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.3);
    transition: all 0.3s ease;
}

.card:hover {
    transform: scale(1.02);
}

/* PAINÉIS */
.side-panel {
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* RELÓGIO */
.hora {
    font-size: 32px;
    font-weight: 700;
}

/* CLIMA */
#clima img {
    width: 50px;
}

/* ANIVERSARIANTES */
.slideshow {
    text-align: center;
}

.slideshow img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 15px;
}

.slideshow h3 {
    font-size: 16px;
    margin-top: 8px;
    color: #0d2a5c;
}

.slideshow span {
    font-size: 13px;
    color: #555;
}

/* BALÕES */
.baloes {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.balao {
    position: absolute;
    animation: subir linear infinite;
}

@keyframes subir {
    0% { transform: translateY(100%); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-150%); opacity: 0; }
}
</style>
</head>

<body>
<div class="overlay">

<header>
PAINEL DE NOTÍCIAS 2026 - EMEF EZEQUIEL RUIZ
</header>

<div class="layout">

<div class="side-panel">

<div class="card">
<h3>🕒 Horário</h3>
<div id="hora" class="hora"></div>
<div id="data"></div>
</div>

<div class="card">
<h3>⛈️ Clima</h3>
<div id="clima">Carregando...</div>
</div>

</div>

<div class="main-panel">

<div class="card">
<h2>📢 Avisos</h2>
<p><b>Fé e Gratidão</b></p>
</div>

<div style="display:flex; gap:20px; justify-content:center;">

<div class="card">
<h2>🎉 Funcionários</h2>
<div class="slideshow" id="slideshow-func">
<img id="imgFunc">
<h3 id="nomeFunc"></h3>
<div class="baloes"></div>
</div>
</div>

<div class="card">
<h2>🌅 Matutino</h2>
<div class="slideshow" id="slideshow-mat">
<img id="imgMat">
<h3 id="nomeMat"></h3>
<div class="baloes"></div>
</div>
</div>

<div class="card">
<h2>🌇 Vespertino</h2>
<div class="slideshow" id="slideshow-ves">
<img id="imgVes">
<h3 id="nomeVes"></h3>
<div class="baloes"></div>
</div>
</div>

</div>

</div>
</div>

<script>

/* RELÓGIO */
setInterval(()=>{
const agora = new Date();
hora.innerHTML = agora.toLocaleTimeString("pt-BR");
data.innerHTML = agora.toLocaleDateString("pt-BR");
},1000);

/* CLIMA */
function atualizarClima(){
fetch("https://api.openweathermap.org/data/2.5/weather?q=Manacapuru&units=metric&lang=pt_br&appid=dd7b1bcf762323de121e892697b16fb7")
.then(r=>r.json())
.then(d=>{
clima.innerHTML=`
<img src="https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png">
<div><b>${Math.round(d.main.temp)}°C</b></div>
<div>${d.weather[0].description}</div>`;
})
.catch(()=>clima.innerHTML="Sem conexão");
}
atualizarClima();

/* BALÕES */
function gerarBaloes(container){
const area = container.querySelector(".baloes");
area.innerHTML="";
for(let i=0;i<6;i++){
let b=document.createElement("div");
b.className="balao";
b.innerText="🎈";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(4+Math.random()*4)+"s";
b.style.fontSize=(18+Math.random()*10)+"px";
area.appendChild(b);
}
}

/* SLIDES */
function slideshow(lista,imgId,nomeId,containerId){
let i=0;
setInterval(()=>{
let item=lista[i];
document.getElementById(imgId).src=item.foto;
document.getElementById(nomeId).innerHTML=
`${item.nome}<br><span>🎂 ${item.data}</span>`;
gerarBaloes(document.getElementById(containerId));
i=(i+1)%lista.length;
},4000);
}

/* DADOS */
const func=[
{nome:"Cézar Silva",data:"17/03",foto:"foto1.jpeg"},
{nome:"Rosana Thalia",data:"21/03",foto:"foto2.jpeg"}
];

const mat=[
{nome:"Mary Hellen",data:"28/03",foto:"aluno1.jpeg"}
];

const ves=[
{nome:"Arthur Pinheiro",data:"04/03",foto:"aluno2.jpeg"}
];

/* INICIAR */
slideshow(func,"imgFunc","nomeFunc","slideshow-func");
slideshow(mat,"imgMat","nomeMat","slideshow-mat");
slideshow(ves,"imgVes","nomeVes","slideshow-ves");

</script>

</body>
</html>
